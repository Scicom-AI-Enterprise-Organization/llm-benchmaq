    base_url: "http://localhost:8000"
    model:
      repo_id: "Qwen/Qwen3.6-35B-A3B"
    bench: *bench_sweep
    results:
      save_result: true
      result_dir: "./benchmarks/vllm/tm-l40s/Qwen3.6-35B-A3B"
